<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Voluntários 2026</title>
    <meta name="description" content="Sistema de escala anual para voluntários - Domingos e Quartas-feiras de 2026.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFDFF;
            margin: 0;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a36d1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b2ab8;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
        
        [hidden] { display: none !important; }
    </style>
</head>
<body class="min-h-screen text-slate-900 pb-24">

    <!-- Header -->
    <header class="bg-[#4a36d1] text-white px-4 py-6 md:px-12 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <i data-lucide="users" class="w-8 h-8 opacity-90"></i>
                <div class="flex flex-col">
                    <h1 class="text-2xl font-bold leading-tight tracking-tight">Escala de Voluntários 2026</h1>
                    <p class="text-sm italic opacity-80">Gestão de Equipes e Turnos</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center bg-white rounded-xl overflow-hidden px-2 py-1 border border-white/10 shadow-lg">
                    <button id="prevMonthBtn" class="p-2 hover:bg-slate-100 rounded-lg transition-colors text-slate-400">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <span id="currentMonthLabel" class="text-xl font-black px-4 min-w-[180px] text-center text-black">
                        Janeiro 2026
                    </span>
                    <button id="nextMonthBtn" class="p-2 hover:bg-slate-100 rounded-lg transition-colors text-slate-400">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>

                <button id="openModalBtn" class="bg-white text-[#4a36d1] font-bold px-6 py-2.5 rounded-xl flex items-center gap-2 shadow-lg hover:bg-slate-50 transition-all active:scale-95 whitespace-nowrap">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    Pessoas
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="mainContent" class="max-w-4xl mx-auto mt-8 px-4 space-y-8">
        <!-- Loading State -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20 gap-4">
            <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="text-slate-400 font-medium animate-pulse">Carregando dados locais...</p>
        </div>
        
        <!-- Days Container -->
        <div id="daysContainer" class="space-y-6" hidden></div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-24 bg-white rounded-[40px] border-2 border-dashed border-slate-200" hidden>
            <i data-lucide="calendar" class="w-12 h-12 text-slate-200 mx-auto mb-4"></i>
            <p class="text-slate-400 font-semibold">Nenhuma escala definida para este mês.</p>
        </div>
    </main>

    <!-- Volunteer Modal -->
    <div id="volunteerModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fade-in" hidden>
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-zoom-in">
            <div class="bg-[#4a36d1] p-6 flex items-center justify-between text-white">
                <div class="flex items-center gap-3">
                    <i data-lucide="user-plus" class="w-6 h-6"></i>
                    <h2 class="text-xl font-bold">Cadastro de Pessoas</h2>
                </div>
                <button id="closeModalBtn" class="p-2 hover:bg-white/10 rounded-xl transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="p-6">
                <div class="flex gap-2 mb-4">
                    <button id="showSingleAdd" class="flex-1 py-2 text-sm font-bold border-b-2 border-[#4a36d1] text-[#4a36d1]">Individual</button>
                    <button id="showBulkAdd" class="flex-1 py-2 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600">Em Massa</button>
                </div>

                <!-- Single Add Form -->
                <form id="addVolunteerForm" class="flex gap-2 mb-6">
                    <div class="relative flex-1">
                        <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input
                            id="newVolunteerName"
                            type="text"
                            placeholder="Nome da pessoa..."
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition-all"
                        />
                    </div>
                    <button
                        type="submit"
                        id="addBtn"
                        class="bg-[#4a36d1] text-white px-4 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-[#3b2ab8] transition-all active:scale-95 flex items-center gap-2"
                    >
                        <i data-lucide="user-plus" class="w-5 h-5"></i>
                        Add
                    </button>
                </form>

                <!-- Bulk Add Form (Hidden by default) -->
                <div id="bulkAddContainer" class="hidden mb-6 space-y-3">
                    <textarea 
                        id="bulkNamesInput" 
                        rows="4" 
                        placeholder="Cole aqui uma lista de nomes (um por linha)..."
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition-all text-sm"
                    ></textarea>
                    <button
                        id="bulkAddBtn"
                        class="w-full bg-[#4a36d1] text-white py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-[#3b2ab8] transition-all active:scale-95 flex items-center justify-center gap-2"
                    >
                        <i data-lucide="layers" class="w-5 h-5"></i>
                        Importar Lista
                    </button>
                </div>

                <div class="flex items-center justify-between mb-4 px-1">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Lista de Pessoas</h3>
                    <div class="flex gap-2">
                        <button id="exportBtn" title="Exportar para arquivo" class="p-1.5 text-slate-400 hover:text-[#4a36d1] hover:bg-indigo-50 rounded-lg transition-all">
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </button>
                        <label for="importFile" title="Importar de arquivo" class="p-1.5 text-slate-400 hover:text-[#4a36d1] hover:bg-indigo-50 rounded-lg transition-all cursor-pointer">
                            <i data-lucide="upload" class="w-4 h-4"></i>
                            <input type="file" id="importFile" class="hidden" accept=".json">
                        </label>
                    </div>
                </div>

                <div id="volunteersList" class="max-h-[250px] overflow-y-auto space-y-2 pr-2 custom-scrollbar">
                    <!-- Volunteers will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Local Storage Persistence Script -->
    <script type="module">
        // Constants
        const ShiftType = {
            MORNING: 'Manhã',
            NIGHT: 'Noite'
        };

        const WeekDay = {
            SUNDAY: 0,
            WEDNESDAY: 3
        };

        const months = [
            'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
            'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
        ];

        const STORAGE_KEYS = {
            SLOTS: 'volunteer_slots_2026',
            VOLUNTEERS: 'volunteers_list'
        };

        // State
        let state = {
            currentMonth: new Date().getMonth(),
            year: 2026,
            volunteerSlots: {},
            volunteersList: [],
            loading: true,
            isModalOpen: false
        };

        // Helpers
        const getDaysForMonth = (year, month) => {
            const days = [];
            const date = new Date(year, month, 1);

            while (date.getMonth() === month) {
                const dayOfWeek = date.getDay();

                if (dayOfWeek === WeekDay.SUNDAY) {
                    days.push({
                        date: new Date(date),
                        dayOfWeek,
                        shifts: [
                            { type: ShiftType.MORNING, slots: 2 },
                            { type: ShiftType.NIGHT, slots: 2 }
                        ]
                    });
                } else if (dayOfWeek === WeekDay.WEDNESDAY) {
                    days.push({
                        date: new Date(date),
                        dayOfWeek,
                        shifts: [
                            { type: ShiftType.NIGHT, slots: 2 }
                        ]
                    });
                }

                date.setDate(date.getDate() + 1);
            }

            return days;
        };

        const getSlotId = (date, shift, index) => {
            const dateStr = date.toISOString().split('T')[0];
            const shiftKey = shift === ShiftType.MORNING ? 'morning' : 'night';
            return `${dateStr}-${shiftKey}-${index}`;
        };

        const saveToStorage = (key, data) => {
            localStorage.setItem(key, JSON.stringify(data));
        };

        const loadFromStorage = (key, defaultValue) => {
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : defaultValue;
        };

        // DOM Elements
        const currentMonthLabel = document.getElementById('currentMonthLabel');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const volunteerModal = document.getElementById('volunteerModal');
        const addVolunteerForm = document.getElementById('addVolunteerForm');
        const newVolunteerName = document.getElementById('newVolunteerName');
        const volunteersListEl = document.getElementById('volunteersList');
        const daysContainer = document.getElementById('daysContainer');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');

        // Render Functions
        const render = () => {
            // Update Header
            currentMonthLabel.textContent = `${months[state.currentMonth]} ${state.year}`;

            // Update Modal Visibility
            if (state.isModalOpen) {
                volunteerModal.hidden = false;
            } else {
                volunteerModal.hidden = true;
            }

            // Update Loading/Empty States
            if (state.loading) {
                loadingState.hidden = false;
                daysContainer.hidden = true;
                emptyState.hidden = true;
                return;
            } else {
                loadingState.hidden = true;
            }

            const days = getDaysForMonth(state.year, state.currentMonth);
            
            if (days.length === 0) {
                daysContainer.hidden = true;
                emptyState.hidden = false;
            } else {
                daysContainer.hidden = false;
                emptyState.hidden = true;
                
                daysContainer.innerHTML = '';
                days.forEach((day) => {
                    const isSunday = day.dayOfWeek === WeekDay.SUNDAY;
                    const headerBg = isSunday ? "bg-[#FFF9F2]" : "bg-[#F5F7FF]";
                    const accentColor = isSunday ? "text-orange-600" : "text-[#4a36d1]";
                    const iconBg = isSunday ? 'bg-orange-100 text-orange-600' : 'bg-indigo-100 text-[#4a36d1]';
                    const badgeClass = isSunday ? 'border-orange-200 text-orange-600 bg-orange-50' : 'border-indigo-200 text-[#4a36d1] bg-indigo-50';
                    
                    const weekdayName = day.date.toLocaleDateString('pt-BR', { weekday: 'long' });
                    const capitalizedWeekday = weekdayName.charAt(0).toUpperCase() + weekdayName.slice(1).split('-')[0];
                    const formattedDate = day.date.toLocaleDateString('pt-BR', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric'
                    });

                    const dayCard = document.createElement('div');
                    dayCard.className = "bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden transition-all hover:shadow-lg hover:-translate-y-0.5";
                    
                    let shiftsHtml = '';
                    day.shifts.forEach((shift) => {
                        const isMorning = shift.type === ShiftType.MORNING;
                        const shiftIcon = isMorning ? 'sun' : 'moon';
                        const shiftColor = isMorning ? "text-orange-600" : "text-[#4a36d1]";

                        let slotsHtml = '';
                        for (let i = 0; i < shift.slots; i++) {
                            const slotId = getSlotId(day.date, shift.type, i);
                            const currentValue = state.volunteerSlots[slotId] || '';
                            
                            const options = state.volunteersList
                                .sort((a, b) => a.name.localeCompare(b.name))
                                .map(v => `<option value="${v.name}" ${currentValue === v.name ? 'selected' : ''}>${v.name}</option>`)
                                .join('');

                            slotsHtml += `
                                <div class="relative flex items-center w-full group">
                                    <div class="absolute left-3 text-slate-400 z-10">
                                        <i data-lucide="user" class="w-4 h-4"></i>
                                    </div>
                                    <select
                                        data-slot-id="${slotId}"
                                        data-date="${day.date.toISOString().split('T')[0]}"
                                        data-shift="${shift.type}"
                                        data-index="${i}"
                                        class="slot-select w-full pl-9 pr-10 py-3 text-sm appearance-none border rounded-xl transition-all duration-200 outline-none cursor-pointer border-slate-200 bg-slate-50/50 hover:bg-white focus:bg-white focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 ${!currentValue ? 'text-slate-400 italic' : 'text-slate-900 font-medium'}"
                                    >
                                        <option value="">Selecione um voluntário...</option>
                                        ${options}
                                    </select>
                                    <div class="absolute right-3 flex items-center gap-2 pointer-events-none">
                                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-300 group-hover:text-indigo-400 transition-colors"></i>
                                    </div>
                                </div>
                            `;
                        }

                        shiftsHtml += `
                            <div class="space-y-5">
                                <div class="flex items-center gap-2 text-[11px] font-black uppercase tracking-[0.15em] ${shiftColor}">
                                    <i data-lucide="${shiftIcon}" class="w-4 h-4"></i>
                                    TURNO ${shift.type}
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${slotsHtml}
                                </div>
                            </div>
                        `;
                    });

                    dayCard.innerHTML = `
                        <div class="px-6 py-5 flex items-center justify-between ${headerBg} border-b border-slate-100/50">
                            <div class="flex items-center gap-3">
                                <div class="p-2 rounded-xl ${iconBg}">
                                    <i data-lucide="calendar" class="w-5 h-5"></i>
                                </div>
                                <h2 class="text-lg md:text-xl font-extrabold tracking-tight ${accentColor}">
                                    ${capitalizedWeekday} - ${formattedDate}
                                </h2>
                            </div>
                            <div class="hidden sm:block">
                                <span class="text-[10px] font-black uppercase px-3 py-1.5 rounded-full border ${badgeClass}">
                                    ${isSunday ? 'Culto de Domingo' : 'Culto de Quarta'}
                                </span>
                            </div>
                        </div>
                        <div class="p-6 space-y-10">
                            ${shiftsHtml}
                        </div>
                    `;
                    daysContainer.appendChild(dayCard);
                });
            }

            // Render Volunteers in Modal
            volunteersListEl.innerHTML = '';
            if (state.volunteersList.length === 0) {
                volunteersListEl.innerHTML = '<p class="text-center text-slate-400 py-8 italic">Nenhuma pessoa cadastrada.</p>';
            } else {
                state.volunteersList.sort((a, b) => a.name.localeCompare(b.name)).forEach((v) => {
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between p-4 bg-slate-50 rounded-2xl group hover:bg-slate-100 transition-colors";
                    div.innerHTML = `
                        <span class="font-semibold text-slate-700">${v.name}</span>
                        <button data-id="${v.id}" class="remove-volunteer-btn p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `;
                    volunteersListEl.appendChild(div);
                });
            }

            // Initialize Lucide Icons
            lucide.createIcons();
        };

        // Actions
        const updateSlot = (slotId, volunteerName) => {
            state.volunteerSlots[slotId] = volunteerName;
            saveToStorage(STORAGE_KEYS.SLOTS, state.volunteerSlots);
            render();
        };

        const addVolunteer = (name) => {
            const trimmedName = name.trim();
            if (!trimmedName) return;
            
            // Avoid duplicates
            if (state.volunteersList.some(v => v.name.toLowerCase() === trimmedName.toLowerCase())) {
                return;
            }

            const newVolunteer = {
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                name: trimmedName
            };
            state.volunteersList.push(newVolunteer);
            saveToStorage(STORAGE_KEYS.VOLUNTEERS, state.volunteersList);
            render();
        };

        const bulkAddVolunteers = (namesString) => {
            const names = namesString.split('\n').map(n => n.trim()).filter(n => n !== '');
            let addedCount = 0;
            
            names.forEach(name => {
                if (!state.volunteersList.some(v => v.name.toLowerCase() === name.toLowerCase())) {
                    state.volunteersList.push({
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                        name: name
                    });
                    addedCount++;
                }
            });

            if (addedCount > 0) {
                saveToStorage(STORAGE_KEYS.VOLUNTEERS, state.volunteersList);
                render();
            }
            return addedCount;
        };

        const removeVolunteer = (id) => {
            const volunteer = state.volunteersList.find(v => v.id === id);
            const name = volunteer ? volunteer.name : "esta pessoa";
            
            if (!confirm(`Deseja realmente remover "${name}" da lista?`)) return;
            
            state.volunteersList = state.volunteersList.filter(v => v.id !== id);
            saveToStorage(STORAGE_KEYS.VOLUNTEERS, state.volunteersList);
            render();
        };

        const exportData = () => {
            const data = {
                volunteers: state.volunteersList,
                slots: state.volunteerSlots,
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `escala-voluntarios-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        const importData = (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.volunteers && Array.isArray(data.volunteers)) {
                        if (confirm("Deseja substituir os dados atuais pelos dados do arquivo?")) {
                            state.volunteersList = data.volunteers;
                            state.volunteerSlots = data.slots || {};
                            saveToStorage(STORAGE_KEYS.VOLUNTEERS, state.volunteersList);
                            saveToStorage(STORAGE_KEYS.SLOTS, state.volunteerSlots);
                            render();
                            alert("Dados importados com sucesso!");
                        }
                    } else {
                        alert("Arquivo inválido.");
                    }
                } catch (err) {
                    alert("Erro ao ler o arquivo.");
                }
            };
            reader.readAsText(file);
        };

        // Initial Load
        const init = () => {
            state.volunteerSlots = loadFromStorage(STORAGE_KEYS.SLOTS, {});
            state.volunteersList = loadFromStorage(STORAGE_KEYS.VOLUNTEERS, []);
            state.loading = false;
            render();
        };

        // Event Handlers
        const showSingleAdd = document.getElementById('showSingleAdd');
        const showBulkAdd = document.getElementById('showBulkAdd');
        const bulkAddContainer = document.getElementById('bulkAddContainer');
        const bulkAddBtn = document.getElementById('bulkAddBtn');
        const bulkNamesInput = document.getElementById('bulkNamesInput');
        const exportBtn = document.getElementById('exportBtn');
        const importFile = document.getElementById('importFile');

        showSingleAdd.onclick = () => {
            showSingleAdd.classList.add('border-[#4a36d1]', 'text-[#4a36d1]');
            showSingleAdd.classList.remove('border-transparent', 'text-slate-400');
            showBulkAdd.classList.remove('border-[#4a36d1]', 'text-[#4a36d1]');
            showBulkAdd.classList.add('border-transparent', 'text-slate-400');
            addVolunteerForm.classList.remove('hidden');
            bulkAddContainer.classList.add('hidden');
        };

        showBulkAdd.onclick = () => {
            showBulkAdd.classList.add('border-[#4a36d1]', 'text-[#4a36d1]');
            showBulkAdd.classList.remove('border-transparent', 'text-slate-400');
            showSingleAdd.classList.remove('border-[#4a36d1]', 'text-[#4a36d1]');
            showSingleAdd.classList.add('border-transparent', 'text-slate-400');
            addVolunteerForm.classList.add('hidden');
            bulkAddContainer.classList.remove('hidden');
        };

        bulkAddBtn.onclick = () => {
            const count = bulkAddVolunteers(bulkNamesInput.value);
            if (count > 0) {
                bulkNamesInput.value = '';
                alert(`${count} pessoas adicionadas com sucesso!`);
            } else {
                alert("Nenhum nome novo foi adicionado.");
            }
        };

        exportBtn.onclick = exportData;
        importFile.onchange = (e) => {
            if (e.target.files.length > 0) {
                importData(e.target.files[0]);
            }
        };

        prevMonthBtn.onclick = () => {
            state.currentMonth = state.currentMonth === 0 ? 11 : state.currentMonth - 1;
            render();
        };

        nextMonthBtn.onclick = () => {
            state.currentMonth = state.currentMonth === 11 ? 0 : state.currentMonth + 1;
            render();
        };

        openModalBtn.onclick = () => {
            state.isModalOpen = true;
            render();
        };

        closeModalBtn.onclick = () => {
            state.isModalOpen = false;
            render();
        };

        addVolunteerForm.onsubmit = (e) => {
            e.preventDefault();
            const name = newVolunteerName.value.trim();
            if (name) {
                addVolunteer(name);
                newVolunteerName.value = '';
            }
        };

        document.addEventListener('click', (e) => {
            if (e.target.closest('.remove-volunteer-btn')) {
                const id = e.target.closest('.remove-volunteer-btn').dataset.id;
                removeVolunteer(id);
            }
        });

        document.addEventListener('change', (e) => {
            if (e.target.classList.contains('slot-select')) {
                const select = e.target;
                const slotId = select.dataset.slotId;
                const volunteerName = select.value;
                updateSlot(slotId, volunteerName);
            }
        });

        // Initialize
        init();

        render();

    </script>
</body>
</html>
